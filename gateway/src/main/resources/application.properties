spring.application.name=api-gateway
server.port=8080

eureka.client.serviceUrl.defaultZone=http://discovery:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.main.web-application-type=reactive

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/bank-realm/protocol/openid-connect/certs

## Eureka
spring.cloud.gateway.routes[0].id=discovery-service
spring.cloud.gateway.routes[0].uri=http://discovery:8761
spring.cloud.gateway.routes[0].predicates[0]=Path=/eureka
spring.cloud.gateway.routes[0].filters[0]=SetPath=/

## Eureka static resources
spring.cloud.gateway.routes[1].id=discovery-service-static
spring.cloud.gateway.routes[1].uri=http://discovery:8761
spring.cloud.gateway.routes[1].predicates[0]=Path=/eureka/**