spring.application.name=mail-api
server.port=8082

eureka.client.serviceUrl.defaultZone=http://discovery:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

server.forward-headers-strategy=framework

keycloak.auth-url=http://localhost:8181/realms/bank-realm/protocol/openid-connect/auth
keycloak.token-url=http://localhost:8181/realms/bank-realm/protocol/openid-connect/token

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_APP_EMAIL}
spring.mail.password=${MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true