services:
  accounts_db:
    container_name: accounts_db
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3306:3306"
    volumes:
      - accounts_db:/var/lib/mysql
    networks:
      - ms_network

networks:
  ms_network:
    driver: bridge

volumes:
  accounts_db: