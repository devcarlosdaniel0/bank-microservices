services:
  db:
    container_name: mysql
    image: mysql:8.0
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - bank_db:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  discovery:
    container_name: discovery
    build:
      context: ./discovery
      dockerfile: Dockerfile
    ports:
      - "8761:8761"

  gateway:
    container_name: gateway
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - discovery

  currency-converter:
    container_name: currency-converter
    build:
      context: ./currency-converter
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8084:8084"

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.5.0
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command: ["start-dev"]
    ports:
      - "8181:8080"

  mail:
    container_name: mail
    build:
      context: ./mail
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8082:8082"

  bank:
    container_name: bank
    build:
      context: ./bank
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8083:8083"
      - "5005:5005"
    depends_on:
      - db

volumes:
  bank_db: